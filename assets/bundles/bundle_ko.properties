auto-drill.settings.title = 자동 드릴

auto-drill.settings.activation-desc = 모드 활성화 (키보드 또는 버튼)
auto-drill.settings.activation-key = 활성화 키
auto-drill.settings.display-toggle-button = 토글 버튼 표시

auto-drill.settings.drills-desc = 드릴이 채굴할 수 있는 최대 광석 타일 수와 드릴 배치에 필요한 최소 광석 수에 대한 설정입니다.
auto-drill.settings.mechanical-drill = 기계식 드릴
auto-drill.settings.pneumatic-drill = 공압식 드릴
auto-drill.settings.laser-drill = 레이저 드릴
auto-drill.settings.airblast-drill = 에어블라스트 드릴
auto-drill.settings.max-tiles = 최대 타일 수
auto-drill.settings.min-ores = 최소 광석 수

auto-drill.settings.optimization-quality-desc = 드릴로 구역을 채우는 최적화 알고리즘은 채굴 속도가 가장 높은 타일부터 시작하여 모든 가능성을 탐색합니다. 최적화 품질 매개변수는 탐색을 얼마나 일찍 종료할지 결정합니다. 이 값을 높이면 연산 속도를 희생하는 대신 더 나은 결과를 얻을 수 있습니다.

auto-drill.settings.bridge-drill-min-ores = 기계식/공압식 드릴 당 최소 광석 수
auto-drill.settings.optimization-min-ores-laser-drill = 레이저 드릴 당 최소 광석 수
auto-drill.settings.optimization-min-ores-airblast-drill = 에어블라스트 드릴 당 최소 광석 수
auto-drill.settings.optimization-quality = 최적화 품질
auto-drill.settings.place-water-extractor-and-power-nodes = 물 추출기 및 전력 노드 배치
auto-drill-welcome-title = 자동 드릴 안내
auto-drill-welcome-text = AutoDrill을 설치해 주셔서 감사합니다. 이 모드를 올바르게 사용하기 위해 아래의 간단한 튜토리얼을 읽어주세요.
auto-drill-tutorial-text = 모드를 활성화하려면 미니맵 옆의 모드 아이콘 버튼을 클릭하거나 (1), 데스크탑이라면 H 키를 누르세요. 이 키는 모드 설정에서 변경할 수 있습니다. 모드가 활성화된 상태에서 타일을 탭하면 메뉴가 표시되어 (2) 해당 자원을 어떤 드릴로 채울지 선택할 수 있습니다.
auto-drill-tutorial2-text = 기계식 드릴, 공압식 드릴, 플라즈마 보어 옵션 선택 시 추가 메뉴가 표시됩니다 (3). 이 메뉴에서 컨베이어 출력 방향을 선택할 수 있습니다.
auto-drill-settings-text = 이 모드는 활성화 키 (기본값 H) 변경, 자동으로 드릴이 채워지는 최대 타일 수 조정, 최적화 품질 향상 등 다양한 설정을 제공합니다.
auto-drill-conclusion-text = 더 자세한 정보는 GitHub 저장소를 방문해주세요 (https://github.com/Pointifix/AutoDrill). 이 모드가 마음에 드셨다면 별점을 남겨주세요. 버그를 발견하거나 기능 요청이 있으시면 GitHub에 이슈로 등록해 주세요.
